buildscript {
    ext {
        opensearch_group = "org.opensearch"
        isSnapshot = "true" == System.getProperty("build.snapshot", "true")
        opensearch_version = System.getProperty("opensearch.version", "3.7.0-SNAPSHOT")
        buildVersionQualifier = System.getProperty("build.version_qualifier", "")
        version_tokens = opensearch_version.tokenize('-')
        opensearch_build = version_tokens[0] + '.0'
        if (buildVersionQualifier) {
            opensearch_build += "-${buildVersionQualifier}"
        }
        if (isSnapshot) {
            opensearch_build += "-SNAPSHOT"
        }
        common_utils_version = System.getProperty("common_utils.version", opensearch_build)
    }

    repositories {
        mavenLocal()
        mavenCentral()
        maven { url "https://ci.opensearch.org/ci/dbc/snapshots/maven/" }
    }

    dependencies {
        classpath "${opensearch_group}.gradle:build-tools:${opensearch_version}"
    }
}

plugins {
    id 'java-library'
    id "com.diffplug.spotless" version "6.25.0"
}

apply plugin: 'opensearch.opensearchplugin'
apply plugin: 'opensearch.pluginzip'

group = "org.opensearch"
version = "${opensearch_build}"

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

opensearchplugin {
    name 'opensearch-workspaces'
    description 'Backend plugin for workspace management with resource sharing integration'
    classname 'org.opensearch.workspaces.WorkspacesPlugin'
    extendedPlugins = ['opensearch-security;optional=true']
}

ext {
    licenseFile = rootProject.file('LICENSE.txt')
    noticeFile = rootProject.file('NOTICE.txt')
}

repositories {
    mavenLocal()
    mavenCentral()
    maven { url "https://ci.opensearch.org/ci/dbc/snapshots/maven/" }
}

dependencies {
    implementation "org.opensearch:common-utils:${common_utils_version}"
    compileOnly files("../security/spi/build/libs/opensearch-security-spi-${opensearch_build}.jar")
}

spotless {
    java {
        target 'src/**/*.java'

        removeUnusedImports()
        importOrder()
        googleJavaFormat()
        trimTrailingWhitespace()
        endWithNewline()
        licenseHeader(
            '''/*
 * Copyright OpenSearch Contributors
 * SPDX-License-Identifier: Apache-2.0
 *
 * The OpenSearch Contributors require contributions made to
 * this file be licensed under the Apache-2.0 license or a
 * compatible open source license.
 */

''',
            'package '
        )

        custom 'Refuse wildcard imports', {
            if (it =~ /\\s+import .*\\*;/) {
                throw new AssertionError("Do not use wildcard imports. 'spotlessApply' cannot resolve this issue.")
            }
        }

        if (System.getProperty('spotless.paddedcell') != null) {
            paddedCell()
        }
    }

    format 'misc', {
        target '*.md', '*.gradle', '**/*.json', '**/*.yaml', '**/*.yml', '.gitignore'

        trimTrailingWhitespace()
        endWithNewline()
    }
}

dependencyLicenses.enabled = false
thirdPartyAudit.enabled = false
loggerUsageCheck.enabled = false
validateNebulaPom.enabled = false
testingConventions.enabled = false

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
