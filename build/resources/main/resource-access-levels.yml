resource_types:
  workspace:
    workspace_read:
      default: true
      allowed_actions:
        - "workspaces:workspace/get"
        - "workspaces:workspace/list"
    workspace_write:
      allowed_actions:
        - "workspaces:workspace/get"
        - "workspaces:workspace/list"
        - "workspaces:workspace/update"
    workspace_admin:
      allowed_actions:
        - "workspaces:workspace/get"
        - "workspaces:workspace/list"
        - "workspaces:workspace/update"
        - "workspaces:workspace/delete"
        - "cluster:admin/security/resource/share"
